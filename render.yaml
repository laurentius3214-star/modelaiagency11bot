services:
  - type: worker
    name: telegram-dm-bot
    runtime: python
    repo: https://github.com/yourusername/telegram-dm-bot
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: MAX_RECIPIENTS
        value: 50
      - key: DEFAULT_DELAY
        value: 3
